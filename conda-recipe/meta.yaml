{% set python_min = "3.11" %}
package:
  name: panseg
  version: "2.0.0"

source:
  path: ..

build:
  noarch: python
  number: 0
  script:
    - "{{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --ignore-installed --no-cache-dir"
    - "mkdir -p {{ PREFIX }}/Menu" # [not win]
    - "cp {{ RECIPE_DIR }}/../Menu/panseg.json {{ PREFIX }}/Menu/{{ PKG_NAME }}_menu.json" # [not win]
    - "cp {{ RECIPE_DIR }}/../Menu/icon.png {{ PREFIX }}/Menu/icon.png" # [not win]
    - "cp {{ RECIPE_DIR }}/../Menu/icon.ico {{ PREFIX }}/Menu/icon.ico" # [not win]
    - "cp {{ RECIPE_DIR }}/../Menu/logo_horizontal.png {{ PREFIX }}/Menu/logo_horizontal.png" # [not win]
    - "cp {{ RECIPE_DIR }}/../Menu/logo_vertical.png {{ PREFIX }}/Menu/logo_vertical.png" # [not win]

  entry_points:
    - panseg = panseg.run_panseg:main

requirements:
  build:
    - python {{ python_min }}
    - pip
    - setuptools

  run:
    - python >={{ python_min }}
    - pip
    - bioimageio.core ==0.10.2
    - bioimageio.spec ==0.5.9.1
    - h5py ==3.16.0
    - napari ==0.7.0
    - pydantic ==2.13.3
    - pyside6 ==6.11.0
    - python-elf ==0.7.4
    - python-graphviz ==0.21
    - pytorch ==2.10.0
    - pyyaml ==6.0.3
    - qt-material ==2.14
    - qtpy ==2.4.3
    - requests ==2.33.1
    - scikit-image ==0.26.0
    - tensorboard ==2.20.0
    - tifffile ==2026.3.3
    - vigra ==1.12.3
    - trimesh ==4.11.5
    - numpy ==2.4.3
    - zarr ==3.1.6
    - zmesh ==1.11.0

test:
  requires:
    - pip
    - python {{ python_min }}
  imports:
    - panseg
  commands:
    - pip check

about:
  home: https://kreshuklab.github.io/panseg/
  license: MIT
