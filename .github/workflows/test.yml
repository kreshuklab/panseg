name: Run tests

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"

jobs:
  test-linux:
    runs-on: ubuntu-22.04
    env:
      DISPLAY: ":99.0"

    steps:
      # Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v6.0.2

      - name: Setup Qt headless display
        uses: pyvista/setup-headless-display-action@v3
        with:
          qt: true

      # Set up Miniconda
      - name: Set Up Miniforge
        uses: conda-incubator/setup-miniconda@v4.0.0
        with:
          python-version: 3.11
          miniforge-version: latest
          mamba-version: "*"
          channels: local,conda-forge
          environment-file: "environment-dev.yaml"
          activate-environment: "panseg-dev"
          conda-remove-defaults: true

      # Display available Conda environments (for debugging purposes)
      - name: List Conda Environments
        shell: bash -l {0}
        run: conda info --envs

      # Run tests using pytest
      - name: Run Tests with Pytest
        shell: bash -l {0}
        run: |
          conda activate panseg-dev
          pytest --cov --cov-report=xml --durations=10
          conda deactivate

      # Upload Codecov report
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
