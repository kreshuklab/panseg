name: Run tests on all platforms

on:
  workflow_dispatch:
  pull_request:
    branches:
      - "main"

jobs:
  test:
    strategy:
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
    runs-on: ["${{ matrix.os }}"]

    defaults:
      run:
        shell: ${{ matrix.os == 'windows' && 'powershell' || 'bash -el {0}' }}

    steps:
      - name: Setup Qt headless display
        uses: pyvista/setup-headless-display-action@v3
        with:
          qt: true

      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Set Up Miniforge
        uses: conda-incubator/setup-miniconda@v4.0.0
        with:
          python-version: 3.11
          miniforge-version: latest
          mamba-version: "*"
          channels: local,conda-forge
          environment-file: "environment-dev.yaml"
          activate-environment: "panseg-dev"
          conda-remove-defaults: true

      - name: Run checks
        run: |
          panseg --help
          pytest
          # pip check
